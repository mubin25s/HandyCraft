name: 🏷️ Auto Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, reopened]

jobs:
  label-pr:
    name: 🏷️ Label Pull Requests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🏷️ Apply labels based on changed files
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  label-size:
    name: 📏 Label PR Size
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 📏 Add size label
        uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_max_size: 10
          s_max_size: 50
          m_max_size: 150
          l_max_size: 500
          fail_if_xl: false
          message_if_xl: |
            🚨 This PR is **XL** (>500 lines). Please consider breaking it into smaller chunks for easier review.
