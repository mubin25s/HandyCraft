name: 🧹 Stale Issues & PRs

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  stale:
    name: 🧹 Mark and Close Stale Items
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: 🧹 Run stale bot
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # ── Issues ──────────────────────────────────
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: '🕰️ stale'
          stale-issue-message: |
            👋 Hi there! This issue has been inactive for **30 days** and has been marked as stale.

            If this is still relevant, please leave a comment or update the issue — otherwise it will be **automatically closed in 7 days**.

            Thank you for contributing to **Handycraft**! 🎨
          close-issue-message: |
            🔒 This issue has been automatically closed due to inactivity.
            Feel free to reopen it if the problem persists or you'd like to continue the discussion.

          # ── Pull Requests ───────────────────────────
          days-before-pr-stale: 21
          days-before-pr-close: 7
          stale-pr-label: '🕰️ stale'
          stale-pr-message: |
            👋 This pull request has been inactive for **21 days** and has been marked as stale.

            Please update or rebase the branch if you'd like to continue — it will be **automatically closed in 7 days** without activity.

            Thank you for your contribution to **Handycraft**! 🚀
          close-pr-message: |
            🔒 This pull request has been automatically closed due to inactivity.
            Feel free to reopen it when you're ready to continue.

          # ── Labels to exempt from going stale ───────
          exempt-issue-labels: 'pinned,security,🐛 bug,🚀 enhancement,📌 roadmap'
          exempt-pr-labels: 'pinned,security,work-in-progress,🔄 WIP'

          # ── Limits ──────────────────────────────────
          operations-per-run: 100
